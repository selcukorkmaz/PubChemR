name: Live PubChem Smoke

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PUBCHEMR_LIVE_SMOKE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: test

      - name: Run nightly live smoke tests
        shell: Rscript {0}
        run: testthat::test_local(filter = "live-smoke", stop_on_failure = TRUE)
