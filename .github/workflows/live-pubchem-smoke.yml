name: Live PubChem Smoke

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PUBCHEMR_LIVE_SMOKE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: test

      - name: Run nightly live smoke tests
        shell: Rscript {0}
        run: testthat::test_local(filter = "live-smoke", stop_on_failure = TRUE)

  live-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PUBCHEMR_BENCHMARK_OUT_DIR: benchmark-artifacts
      PUBCHEMR_BENCHMARK_HISTORY: .cache/pubchemr-benchmark-history.csv
      PUBCHEMR_BENCHMARK_BASELINE_FILE: inst/benchmarks/live-thresholds.csv
      PUBCHEMR_BENCHMARK_CALIBRATED_FILE: .cache/pubchemr-calibrated-thresholds.csv
      PUBCHEMR_BENCHMARK_CALIBRATION_REPORT: benchmark-artifacts/threshold-calibration.md

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: test

      - name: Restore benchmark cache
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: pubchemr-live-benchmark-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            pubchemr-live-benchmark-${{ runner.os }}-${{ github.ref_name }}-
            pubchemr-live-benchmark-${{ runner.os }}-

      - name: Select threshold file
        shell: bash
        run: |
          if [ -f ".cache/pubchemr-calibrated-thresholds.csv" ]; then
            echo "PUBCHEMR_BENCHMARK_THRESHOLD_FILE=.cache/pubchemr-calibrated-thresholds.csv" >> "$GITHUB_ENV"
          else
            echo "PUBCHEMR_BENCHMARK_THRESHOLD_FILE=inst/benchmarks/live-thresholds.csv" >> "$GITHUB_ENV"
          fi

      - name: Run live benchmark harness with threshold gate
        shell: Rscript {0}
        run: source("scripts/ci/run_live_benchmark_harness.R")

      - name: Calibrate thresholds from rolling history
        if: always()
        shell: Rscript {0}
        run: source("scripts/ci/calibrate_live_benchmark_thresholds.R")

      - name: Save benchmark cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: pubchemr-live-benchmark-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-pubchem-benchmark-${{ github.run_id }}
          path: |
            benchmark-artifacts/**
            .cache/pubchemr-benchmark-history.csv
            .cache/pubchemr-calibrated-thresholds.csv
          if-no-files-found: warn
          retention-days: 30
