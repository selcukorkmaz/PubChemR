name: Fast Mocked Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  mocked-tests:
    runs-on: ubuntu-latest
    env:
      PUBCHEMR_LIVE_SMOKE: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: test

      - name: Run mocked test suite
        shell: Rscript {0}
        run: testthat::test_local(stop_on_failure = TRUE)
